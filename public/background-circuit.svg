<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Deep Cyber Room Radial Gradient -->
    <radialGradient id="cyber-room-lighting" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1B1B48" />
      <stop offset="50%" stop-color="#0A0A1C" />
      <stop offset="100%" stop-color="#020206" />
    </radialGradient>

    <!-- Supercharged Intense Neon Bloom Filters -->
    <filter id="intense-cyan-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="intense-magenta-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="intense-yellow-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Cyberpunk Hazard Stripe Pattern -->
    <pattern id="hazard-stripes" width="20" height="20" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="10" height="20" fill="#FFE600" />
      <rect x="10" width="10" height="20" fill="#050510" />
    </pattern>
  </defs>

  <!-- 1. BASE CANVAS & DARK CYBER ROOM -->
  <rect width="1440" height="900" fill="url(#cyber-room-lighting)" />

  <!-- Technical Background Grid Overlay -->
  <g stroke="#1A1A40" stroke-width="1" opacity="0.4">
    <path d="M 0,150 L 1440,150 M 0,300 L 1440,300 M 0,450 L 1440,450 M 0,600 L 1440,600 M 0,750 L 1440,750" />
    <path d="M 240,0 L 240,900 M 480,0 L 480,900 M 720,0 L 720,900 M 960,0 L 960,900 M 1200,0 L 1200,900" />
  </g>

  <!-- 3D Angular Perspective Seams (Octagonal Back Frame) -->
  <polygon points="260,160 1180,160 1180,740 260,740" fill="none" stroke="#2A2A66" stroke-width="2" stroke-dasharray="6 6" />
  <line x1="0" y1="0" x2="260" y2="160" stroke="#00F0FF" stroke-width="2" opacity="0.4" />
  <line x1="1440" y1="0" x2="1180" y2="160" stroke="#F90072" stroke-width="2" opacity="0.4" />
  <line x1="0" y1="900" x2="260" y2="740" stroke="#FFE600" stroke-width="2" opacity="0.4" />
  <line x1="1440" y1="900" x2="1180" y2="740" stroke="#D7B0FF" stroke-width="2" opacity="0.4" />

  <!-- Laser-Etched Corner Distance Ticks -->
  <g stroke="#00F0FF" stroke-width="1.5" opacity="0.6">
    <path d="M 50,30 L 60,37 M 70,42 L 80,49 M 90,54 L 100,61" />
    <path d="M 1390,30 L 1380,37 M 1370,42 L 1360,49 M 1350,54 L 1340,61" />
  </g>

  <!-- 2. UNDERPASS CIRCUIT TRACES (Bottom Network Layer) -->

  <!-- YELLOW HIGH-VOLTAGE TRACE -->
  <g filter="url(#intense-yellow-glow)">
    <!-- Black Outer Ink -->
    <path d="M 180,910 L 180,760 Q 180,740 200,740 L 520,740 Q 540,740 540,720 L 540,460 Q 540,440 520,440 L 320,440 Q 300,440 300,420 L 300,280 Q 300,260 320,260 L 680,260" 
          fill="none" stroke="#000000" stroke-width="14" stroke-linecap="square" stroke-linejoin="round" />
    <!-- Vivid Yellow Halo -->
    <path d="M 180,910 L 180,760 Q 180,740 200,740 L 520,740 Q 540,740 540,720 L 540,460 Q 540,440 520,440 L 320,440 Q 300,440 300,420 L 300,280 Q 300,260 320,260 L 680,260" 
          fill="none" stroke="#FFE600" stroke-width="7" stroke-linecap="square" stroke-linejoin="round" />
    <!-- Laser White Hot Center Core -->
    <path d="M 180,910 L 180,760 Q 180,740 200,740 L 520,740 Q 540,740 540,720 L 540,460 Q 540,440 520,440 L 320,440 Q 300,440 300,420 L 300,280 Q 300,260 320,260 L 680,260" 
          fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="square" stroke-linejoin="round" />

    <!-- Octagonal Solder Pad Terminal -->
    <polygon points="680,248 692,260 692,272 680,284 668,284 656,272 656,260 668,248" fill="#000000" stroke="#FFE600" stroke-width="2" />
    <circle cx="674" cy="266" r="4" fill="#FFFFFF" />
  </g>

  <!-- LAVENDER DATA BUS TRACE -->
  <g filter="url(#intense-magenta-glow)">
    <path d="M 1450,440 L 1120,440 Q 1100,440 1100,420 L 1100,220 Q 1100,200 1080,200 L 640,200 Q 620,200 620,220 L 620,340" 
          fill="none" stroke="#000000" stroke-width="12" stroke-linecap="square" stroke-linejoin="round" />
    <path d="M 1450,440 L 1120,440 Q 1100,440 1100,420 L 1100,220 Q 1100,200 1080,200 L 640,200 Q 620,200 620,220 L 620,340" 
          fill="none" stroke="#D7B0FF" stroke-width="6" stroke-linecap="square" stroke-linejoin="round" />
    <path d="M 1450,440 L 1120,440 Q 1100,440 1100,420 L 1100,220 Q 1100,200 1080,200 L 640,200 Q 620,200 620,220 L 620,340" 
          fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="square" stroke-linejoin="round" />

    <polygon points="620,330 630,340 630,350 620,360 610,360 600,350 600,340 610,330" fill="#000000" stroke="#D7B0FF" stroke-width="2" />
    <circle cx="615" cy="345" r="3" fill="#FFFFFF" />
  </g>

  <!-- 3. OVERPASS CROSSING TRACES (Tangled Dense Top Layer) -->

  <!-- CYAN PRIMARY HIGH-SPEED TRACE -->
  <g filter="url(#intense-cyan-glow)">
    <!-- Heavy Outer Black Bridge Clipping Stroke -->
    <path d="M -10,320 L 220,320 Q 240,320 240,340 L 240,540 Q 240,560 260,560 L 460,560 Q 480,560 480,540 L 480,320 Q 480,300 500,300 L 860,300 Q 880,300 880,320 L 880,500" 
          fill="none" stroke="#000000" stroke-width="16" stroke-linecap="square" stroke-linejoin="round" />
    <!-- Electric Cyan Halo -->
    <path d="M -10,320 L 220,320 Q 240,320 240,340 L 240,540 Q 240,560 260,560 L 460,560 Q 480,560 480,540 L 480,320 Q 480,300 500,300 L 860,300 Q 880,300 880,320 L 880,500" 
          fill="none" stroke="#00F0FF" stroke-width="8" stroke-linecap="square" stroke-linejoin="round" />
    <!-- Pure White Hot Laser Center -->
    <path d="M -10,320 L 220,320 Q 240,320 240,340 L 240,540 Q 240,560 260,560 L 460,560 Q 480,560 480,540 L 480,320 Q 480,300 500,300 L 860,300 Q 880,300 880,320 L 880,500" 
          fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="round" />

    <polygon points="880,488 894,500 894,512 880,524 866,524 852,512 852,500 866,488" fill="#000000" stroke="#00F0FF" stroke-width="2" />
    <circle cx="873" cy="506" r="4" fill="#FFFFFF" />
  </g>

  <!-- MAGENTA LASER TRACE (Tangles Top -> Bottom Right) -->
  <g filter="url(#intense-magenta-glow)">
    <path d="M 440,-10 L 440,140 Q 440,160 420,160 L 260,160 Q 240,160 240,180 L 240,480 Q 240,500 260,500 L 740,500 Q 760,500 760,520 L 760,680 Q 760,700 780,700 L 1020,700" 
          fill="none" stroke="#000000" stroke-width="16" stroke-linecap="square" stroke-linejoin="round" />
    <path d="M 440,-10 L 440,140 Q 440,160 420,160 L 260,160 Q 240,160 240,180 L 240,480 Q 240,500 260,500 L 740,500 Q 760,500 760,520 L 760,680 Q 760,700 780,700 L 1020,700" 
          fill="none" stroke="#F90072" stroke-width="8" stroke-linecap="square" stroke-linejoin="round" />
    <path d="M 440,-10 L 440,140 Q 440,160 420,160 L 260,160 Q 240,160 240,180 L 240,480 Q 240,500 260,500 L 740,500 Q 760,500 760,520 L 760,680 Q 760,700 780,700 L 1020,700" 
          fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="round" />

    <polygon points="1020,688 1034,700 1034,712 1020,724 1006,724 992,712 992,700 1006,688" fill="#000000" stroke="#F90072" stroke-width="2" />
    <circle cx="1013" cy="706" r="4" fill="#FFFFFF" />
  </g>

  <!-- DUAL PARALLEL CYBER RIBBON (Cyan/Yellow Parallel Line) -->
  <g filter="url(#intense-cyan-glow)">
    <path d="M 1260,910 L 1260,760 Q 1260,740 1240,740 L 940,740 Q 920,740 920,720 L 920,600 Q 920,580 940,580 L 1200,580 Q 1220,580 1220,560 L 1220,340 Q 1220,320 1200,320 L 980,320" 
          fill="none" stroke="#000000" stroke-width="12" stroke-linecap="square" stroke-linejoin="round" />
    <path d="M 1260,910 L 1260,760 Q 1260,740 1240,740 L 940,740 Q 920,740 920,720 L 920,600 Q 920,580 940,580 L 1200,580 Q 1220,580 1220,560 L 1220,340 Q 1220,320 1200,320 L 980,320" 
          fill="none" stroke="#00F0FF" stroke-width="5" stroke-linecap="square" stroke-linejoin="round" />
    <path d="M 1260,910 L 1260,760 Q 1260,740 1240,740 L 940,740 Q 920,740 920,720 L 920,600 Q 920,580 940,580 L 1200,580 Q 1220,580 1220,560 L 1220,340 Q 1220,320 1200,320 L 980,320" 
          fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="round" />
  </g>

  <!-- 4. HIGH-TECH HARDWARE ACCESSORIES & EDGY DECALS -->

  <!-- EDGY CYBERPUNK PROCESSOR DIE (Center Back Wall) -->
  <g transform="translate(780, 430)">
    <!-- Heavy Black Base & Cyan Outer Frame -->
    <rect x="-6" y="-6" width="92" height="72" rx="8" fill="#000000" />
    <rect x="0" y="0" width="80" height="60" rx="6" fill="#0A0A20" stroke="#00F0FF" stroke-width="3" />
    
    <!-- Metallic Heat Sink Fins (Top & Bottom) -->
    <path d="M 10,-10 L 10,0 M 25,-10 L 25,0 M 40,-10 L 40,0 M 55,-10 L 55,0 M 70,-10 L 70,0" stroke="#D7B0FF" stroke-width="3" stroke-linecap="round" />
    <path d="M 10,60 L 10,70 M 25,60 L 25,70 M 40,60 L 40,70 M 55,60 L 55,70 M 70,60 L 70,70" stroke="#D7B0FF" stroke-width="3" stroke-linecap="round" />

    <!-- Glowing Magenta Silicon Core -->
    <rect x="20" y="12" width="40" height="36" rx="4" fill="#180415" stroke="#F90072" stroke-width="2" />
    <rect x="28" y="20" width="24" height="20" rx="2" fill="#F90072" filter="url(#intense-magenta-glow)" />
    
    <!-- Tech Label Callout -->
    <text x="40" y="54" font-family="monospace" font-size="6" font-weight="bold" fill="#FFE600" text-anchor="middle" letter-spacing="1">CORE_FX-9000</text>
  </g>

  <!-- HIGH VOLTAGE HAZARD DECAL BLOCK (Left Side Wall) -->
  <g transform="translate(320, 680)">
    <rect x="-3" y="-3" width="76" height="36" rx="4" fill="#000000" />
    <rect x="0" y="0" width="70" height="30" rx="2" fill="url(#hazard-stripes)" stroke="#000000" stroke-width="2" />
    <!-- Caution Plate Overlay -->
    <rect x="10" y="6" width="50" height="18" fill="#000000" rx="2" />
    <text x="35" y="18" font-family="monospace" font-size="8" font-weight="900" fill="#FFE600" text-anchor="middle" letter-spacing="1">⚡ 1000V</text>
  </g>

  <!-- ANGULAR OPTICAL SENSOR / VISOR LED (Top Right Wall) -->
  <g transform="translate(1120, 180)">
    <polygon points="-4,-4 64,-4 74,16 64,36 -4,36" fill="#000000" />
    <polygon points="0,0 60,0 68,12 60,28 0,28" fill="#0A0A1C" stroke="#F90072" stroke-width="2" />
    <!-- Visor Scan Lines -->
    <line x1="10" y1="14" x2="50" y2="14" stroke="#00F0FF" stroke-width="4" filter="url(#intense-cyan-glow)" />
    <circle cx="50" cy="14" r="3" fill="#FFFFFF" />
  </g>

  <!-- DUAL RIBBON CABLE CLAMPS (Metallic Edgy Brackets) -->
  <g transform="translate(230, 480)">
    <rect x="-6" y="-10" width="28" height="20" rx="2" fill="#000000" />
    <rect x="-3" y="-8" width="22" height="16" rx="1" fill="#181838" stroke="#FFE600" stroke-width="2" />
    <line x1="8" y1="-8" x2="8" y2="8" stroke="#000000" stroke-width="2" />
  </g>

  <g transform="translate(730, 480)">
    <rect x="-6" y="-10" width="28" height="20" rx="2" fill="#000000" />
    <rect x="-3" y="-8" width="22" height="16" rx="1" fill="#181838" stroke="#00F0FF" stroke-width="2" />
    <line x1="8" y1="-8" x2="8" y2="8" stroke="#000000" stroke-width="2" />
  </g>

  <!-- 5. NEW-AGE ANIME SPARKLES & VECTOR LIGHTNING -->
  <!-- 4-Point Sharp Anime Sparkles -->
  <g fill="#00F0FF" filter="url(#intense-cyan-glow)">
    <path d="M 660,180 L 664,195 L 679,199 L 664,203 L 660,218 L 656,203 L 641,199 L 656,195 Z" />
  </g>
  <g fill="#FFE600" filter="url(#intense-yellow-glow)">
    <path d="M 870,230 L 873,240 L 883,243 L 873,246 L 870,256 L 867,246 L 857,243 L 867,240 Z" />
  </g>
  <g fill="#F90072" filter="url(#intense-magenta-glow)">
    <path d="M 1160,520 L 1163,528 L 1171,531 L 1163,534 L 1160,542 L 1157,534 L 1149,531 L 1157,528 Z" />
  </g>

  <!-- High-Tech Bus Identity Typography Overlay -->
  <text x="270" y="180" font-family="monospace" font-size="9" fill="#00F0FF" opacity="0.6" letter-spacing="2">[SYS_BUS_A1]</text>
  <text x="1090" y="730" font-family="monospace" font-size="9" fill="#F90072" opacity="0.6" letter-spacing="2">[PWR_GRID_02]</text>
</svg>
